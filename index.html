        .leaflet-popup-content-wrapper {

            border-radius: 12px;

        }

            align-items: center;
        }
        .cam-popup b {
            font-size: 14px;
            margin-bottom: 6px;
            text-align: center;
        }
        .cam-preview {
            width: 240px;
            height: 135px;
            border: 2px solid #555;
            border-radius: 8px;
            overflow: hidden;
            margin: 6px 0;
            background: #000;
        }
        .cam-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .cam-link {
            display: inline-block;
            margin-top: 6px;
            padding: 6px 14px;
            background: #4a90d9;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .cam-link:hover {
            background: #3570b0;
        }
