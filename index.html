        }
        .leaflet-popup-content-wrapper {
            background: #2c2c2c;
            color: #f0f0f0;
            border-radius: 12px;

        }
        .leaflet-popup-tip {
            background: #2c2c2c;
        }
        .leaflet-popup-content {
            margin: 10px 14px;
        }
        .cam-popup {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 220px;
        }
        .cam-popup b {
            font-size: 14px;
            margin-bottom: 6px;
            text-align: center;
        }
        .cam-preview {
            width: 240px;
            height: 135px;
            border: 2px solid #555;
            border-radius: 8px;
            overflow: hidden;
            margin: 6px 0;
            background: #000;
        }
        .cam-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .cam-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .cam-link, .cam-share {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            border: none;
            color: white;
        }
        .cam-link {
            background: #4a90d9;
        }
        .cam-link:hover {
            background: #3570b0;
        }
        .cam-share {
            background: #6c757d;
        }
        .cam-share:hover {
            background: #545b62;
        }
        .cam-views {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        .top-controls {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 8px;
            background: #1e1e1e;
            padding: 8px 12px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .top-controls input {
            width: 200px;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            background: #2c2c2c;
            color: #f0f0f0;
            font-size: 14px;
            outline: none;
        }
        .top-controls input::placeholder {
            color: #aaa;
        }
        .top-controls select {
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            background: #2c2c2c;
            color: #f0f0f0;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        .top-controls button {
            padding: 10px 16px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
        }
        .top-controls button:hover {
            background: #3570b0;
        }
        datalist option {
            background: #2c2c2c;
            color: #f0f0f0;
        }
    </style>

            // ===== Свердловский =====

        ];

        // Управление просмотрами
        const viewsKey = 'cam_views';
        let views = JSON.parse(localStorage.getItem(viewsKey) || '{}');
        function getViews(address) {
            return views[address] || 0;
        }
        function incrementViews(address) {
            views[address] = (views[address] || 0) + 1;
            localStorage.setItem(viewsKey, JSON.stringify(views));
            return views[address];
        }

        // Функция "Поделиться"
        function shareCamera(address, url) {
            if (navigator.share) {
                navigator.share({
                    title: `Камера: ${address}`,
                    url: url
                }).catch(err => console.log('Поделиться не удалось'));
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('Ссылка скопирована в буфер обмена!');
                }).catch(() => {
                    prompt('Скопируйте ссылку вручную:', url);
                });
            }
        }

        // Группа маркеров и текущий фильтр
        let markerGroup = L.layerGroup().addTo(map);
        let currentDistrict = '';

        function buildPopupContent(cam) {
            const viewsCount = getViews(cam.address);
            return `
                <div class="cam-popup">
                    <b>${cam.address}</b>
                    <div class="cam-preview">
                        <iframe src="${cam.url}" allowfullscreen></iframe>
                    </div>
                    <div class="cam-actions">
                        <a class="cam-link" href="${cam.url}" target="_blank">Смотреть камеру</a>
                        <button class="cam-share" onclick="event.stopPropagation(); shareCamera('${cam.address.replace(/'/g, "\\'")}', '${cam.url}')">📤 Поделиться</button>
                    </div>
                    <div class="cam-views">👁 ${viewsCount}</div>
                </div>
            `;
        }

        function showFilteredCameras(district) {
            markerGroup.clearLayers();
            const filtered = district ? cameras.filter(c => c.district === district) : cameras;
            filtered.forEach(cam => {
                const marker = L.marker([cam.lat, cam.lon]).addTo(markerGroup);
                marker.bindPopup(buildPopupContent(cam), { maxWidth: 300 });
                marker.on('popupopen', function() {
                    incrementViews(cam.address);
                    const newPopupContent = buildPopupContent(cam);
                    marker.setPopupContent(newPopupContent);
                });
            });
        }

        // Инициализация
        showFilteredCameras('');

        // Фильтр районов
        document.getElementById('districtFilter').addEventListener('change', function(e) {
            currentDistrict = e.target.value;
            showFilteredCameras(currentDistrict);
        });

        // Поиск
        const datalist = document.getElementById('camerasList');
        cameras.forEach(cam => {
            const option = document.createElement('option');
            option.value = cam.address;
            datalist.appendChild(option);
        });

        function findAndGo(address) {
            const cam = cameras.find(c => c.address === address);
            if (cam) {
                if (currentDistrict && cam.district !== currentDistrict) {
                    document.getElementById('districtFilter').value = '';
                    showFilteredCameras('');
                    currentDistrict = '';
                }
                markerGroup.eachLayer(layer => {
                    if (layer.getLatLng().lat === cam.lat && layer.getLatLng().lng === cam.lon) {
                        map.setView(layer.getLatLng(), 16);
                        layer.openPopup();
                    }
                });
            }
        }

        document.getElementById('searchInput').addEventListener('change', function() {
            const val = this.value.trim();
            if (val) findAndGo(val);
        });
        document.getElementById('searchBtn').addEventListener('click', function() {
            const val = document.getElementById('searchInput').value.trim();
            if (val) findAndGo(val);
        });
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim();
                if (val) findAndGo(val);
            }
        });
    </script>
